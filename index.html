 *
 * @summary Main HTML5 shell, SEO meta tags, and root mounting portal.
 *
 * @description:
 * Establishes the static viewport DOM structure, SEO indexing tags, and hooks the Vite module bundler.
 *
 * @since 01/06/2026
 * @updated 03/06/2026
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/blecks_cave.png" />
    <link rel="apple-touch-icon" href="/blecks_cave.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preload Critical Hero Background Assets -->
    <link rel="preload" as="image" href="/assets/aetas_ferrea_bg.png" />

    <!-- SEO Optimization -->
    <title>Bleck's Wiki</title>
    <meta
      name="description"
      content="The ultimate wiki guide for all creations by Bleckwolf25, including Velocita Optimized, Builder++, BetterThanPVP Aetas Ferrea. Find installations, updates, specifications and information."
    />
    <meta
      name="keywords"
      content="minecraft, modpack, mods, resourcepacks, shaderpacks, wiki, guide, realism, pvp, builder"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Bleckwolf25" />

    <!-- Open Graph (Facebook / Discord / Social Share Previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bleck's Wiki | Custom Modpack Universes" />
    <meta
      property="og:description"
      content="Discover, download, and dominate with the custom modpacks of Bleck's. View dynamic guides, key features, and full specifications in our high-fidelity theme-morphing wiki."
    />
    <meta property="og:image" content="https://bleckscaveminecraft.wiki/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://bleckscaveminecraft.wiki" />

    <!-- Google Fonts Preconnect links for fast page load performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Default Portal Theme Font Link (Dynamically updated per modpack in theme.js) -->
    <link
      id="theme-google-font"
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap"
    />

    <!-- Core Styling -->
    <link rel="stylesheet" href="/src/styles/style.scss" />
  </head>
  <body class="theme-portal" data-theme="portal">
    <!-- Full-screen transition wipe overlay mount point -->
    <div id="theme-wipe-overlay" class="theme-transition-overlay"></div>

    <!-- Application Root container mount point -->
    <div id="app"></div>

    <!-- Application Module Entrypoint -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
