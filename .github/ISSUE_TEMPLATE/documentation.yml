name: Documentation
description: Report an issue with documentation or suggest improvements
title: '[Docs] '
labels: ['documentation', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! Please provide as much detail as possible.

  - type: dropdown
    id: type
    attributes:
      label: Issue Type
      description: What type of documentation issue is this?
      options:
        - Inaccurate information
        - Missing information
        - Unclear or confusing
        - Typo or grammar
        - Outdated content
        - Suggestion for improvement
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page or Section
      description: Which page or section of the documentation does this relate to?
      placeholder: e.g., Getting Started, API Reference, etc.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the documentation issue or your suggestion
      placeholder: Describe the issue or suggestion...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Changes
      description: If you have specific text or changes in mind, please provide them here
      placeholder: Suggest specific changes...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the documentation issue
      placeholder: Any additional information...
